dataset:
  name: PMC-VQA
  split: test_clean
  data_dir: ./data/pmc_vqa
perturbations:
- name: original
- name: black
- name: lpf
  sigma: 3.0
- name: hpf
  sigma: 25.0
- name: patch_shuffle
  patch_size: 16
  seed: 42
decoding:
  temperature: 0
  do_sample: false
  max_new_tokens: 32
  num_beams: 1
dataloader:
  num_workers: 8
  prefetch_factor: 2
prompt:
  template: '{question}

    A. {choice_A}

    B. {choice_B}

    C. {choice_C}

    D. {choice_D}

    Answer with the option''s letter from the given choices directly.

    '
models:
  llava_med:
    name: LLaVA-Med-1.5
    hf_repo: microsoft/llava-med-v1.5-mistral-7b
    precision: fp16
    batch_size: 1
    max_new_tokens: 32
  huatuogpt:
    name: HuatuoGPT-Vision-7B
    hf_repo: FreedomIntelligence/HuatuoGPT-Vision-7B
    precision: bf16
    batch_size: 1
    max_new_tokens: 32
  medvint:
    name: MedVInT-TD
    hf_repo: xmcmic/MedVInT-TD
    precision: fp16
    batch_size: 1
    max_new_tokens: 32
output:
  dir: ./results
  save_logits: true
  save_raw_output: true
seed: 42
hardware:
  min_gpu_vram_gb: 24
  recommended_gpu: A6000 Ada (48GB)
